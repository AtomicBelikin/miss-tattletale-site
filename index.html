<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Miss Tattletale™ — Coming Soon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --plum: #2D1B2E;
    --coral: #FF6B7A;
    --yellow: #FFD23F;
    --mint: #A8E6CF;
    --plum-soft: #6B5868;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Quicksand', sans-serif;
    background: var(--bg);
    color: var(--plum);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image: radial-gradient(var(--mint) 1.5px, transparent 1.5px);
    background-size: 28px 28px;
    opacity: 0.35;
    pointer-events: none;
  }
  .container {
    position: relative;
    z-index: 2;
    text-align: center;
    padding: 2rem;
    max-width: 700px;
  }
  .bubble {
    position: absolute;
    border-radius: 50%;
    opacity: 0;
    animation: float-in 1s ease-out forwards, drift 6s ease-in-out infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    user-select: none;
  }
  .bubble--1 { width:64px;height:64px;background:var(--coral);color:white;font-size:1.6rem;top:8%;left:12%;animation-delay:0.2s,1.2s; }
  .bubble--2 { width:46px;height:46px;background:var(--yellow);color:var(--plum);font-size:1.2rem;top:18%;right:14%;animation-delay:0.5s,1.5s; }
  .bubble--3 { width:38px;height:38px;background:var(--mint);color:var(--plum);font-size:1rem;bottom:22%;left:8%;animation-delay:0.8s,1.8s; }
  .bubble--4 { width:30px;height:30px;background:var(--plum);color:var(--bg);font-size:0.85rem;bottom:14%;right:10%;animation-delay:1.1s,2.1s; }
  @keyframes float-in { from{opacity:0;transform:translateY(20px) scale(0.6)}to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes drift { 0%,100%{transform:translateY(0px)}50%{transform:translateY(-14px)} }
  .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    background: var(--plum);
    color: var(--bg);
    font-family: 'Baloo 2', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.5rem 1.2rem;
    border-radius: 999px;
    margin-bottom: 1.75rem;
    opacity: 0;
    animation: fade-up 0.7s ease-out 0.1s forwards;
  }
  .eyebrow .dot { width:8px;height:8px;border-radius:50%;background:var(--coral);animation:pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:0.6} }
  h1 {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 800;
    font-size: clamp(3rem, 12vw, 6.5rem);
    line-height: 1;
    color: var(--coral);
    text-shadow: 4px 4px 0 var(--plum);
    letter-spacing: -0.01em;
    opacity: 0;
    animation: fade-up 0.7s ease-out 0.3s forwards;
  }
  h1 sup { font-size:0.32em;top:-2.2em;color:var(--plum);text-shadow:none;font-weight:700; }
  .coming-soon {
    font-family: 'Baloo 2', sans-serif;
    font-weight: 700;
    font-size: clamp(1.4rem, 4vw, 2.2rem);
    color: var(--plum);
    margin-top: 2.5rem;
    padding: 0.85rem 2.5rem;
    background: var(--yellow);
    border-radius: 999px;
    border: 4px solid var(--plum);
    display: inline-block;
    transform: rotate(-2deg);
    opacity: 0;
    animation: fade-up 0.7s ease-out 0.5s forwards, wiggle 4s ease-in-out 2s infinite;
  }
  @keyframes wiggle { 0%,100%{transform:rotate(-2deg)}50%{transform:rotate(1deg)} }
  @keyframes fade-up { from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)} }
  .socials {
    margin-top: 3rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
    opacity: 0;
    animation: fade-up 0.7s ease-out 0.7s forwards;
  }
  .socials a {
    font-family: 'Quicksand', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    color: var(--plum);
    text-decoration: none;
    background: white;
    border: 2px solid var(--plum);
    border-radius: 999px;
    padding: 0.6rem 1.4rem;
    transition: transform 0.15s ease, background 0.15s ease, color 0.15s ease;
  }
  .socials a:hover { background:var(--plum);color:var(--bg);transform:translateY(-3px); }
  .footer-note {
    margin-top: 2.5rem;
    font-size: 0.85rem;
    color: var(--plum-soft);
    opacity: 0;
    animation: fade-up 0.7s ease-out 0.9s forwards;
  }
  @media (prefers-reduced-motion: reduce) {
    *,*::before,*::after { animation-duration:0.01ms!important;animation-iteration-count:1!important; }
    .bubble { animation:none;opacity:1; }
  }
  @media (max-width: 480px) {
    .bubble--1,.bubble--2,.bubble--3,.bubble--4 { display:none; }
    h1 { text-shadow:3px 3px 0 var(--plum); }
  }
</style>
</head>
<body>
  <div class="bubble bubble--1">!</div>
  <div class="bubble bubble--2">?</div>
  <div class="bubble bubble--3">★</div>
  <div class="bubble bubble--4">●</div>
  <div class="container">
    <div class="eyebrow"><span class="dot"></span> Psst... something's coming</div>
    <h1>Miss Tattletale<sup>™</sup></h1>
    <div class="coming-soon">Coming Soon!</div>
    <div class="socials">
      <a href="https://www.instagram.com/miss.tattletale" target="_blank" rel="noopener">Instagram</a>
      <a href="https://www.tiktok.com/@miss.tattletale" target="_blank" rel="noopener">TikTok</a>
      <a href="https://www.facebook.com/misstattletale" target="_blank" rel="noopener">Facebook</a>
      <a href="https://www.youtube.com/@miss.tattletale" target="_blank" rel="noopener">YouTube</a>
      <a href="https://x.com/miss_tattletale" target="_blank" rel="noopener">X</a>
    </div>
    <p class="footer-note">© 2026 Miss Tattletale™. All rights reserved.</p>
  </div>
</body>
</html>
